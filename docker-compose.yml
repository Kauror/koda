services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-koda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-koda_password}
      POSTGRES_DB: ${POSTGRES_DB:-koda}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Exposed for local development tools; remove or firewall on a public server.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-koda} -d ${POSTGRES_DB:-koda}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL:-https://liige.orgusaar.ee}
      DATABASE_URL: postgresql://${POSTGRES_USER:-koda}:${POSTGRES_PASSWORD:-koda_password}@postgres:5432/${POSTGRES_DB:-koda}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CRAWLER_ENABLED: ${CRAWLER_ENABLED:-true}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-5}
      CRAWLER_FETCH_BODY: ${CRAWLER_FETCH_BODY:-true}
      CRAWLER_MAX_BODY_FETCHES: ${CRAWLER_MAX_BODY_FETCHES:-100}
      CRAWLER_DELAY_MS: ${CRAWLER_DELAY_MS:-1000}
      AI_ENABLED: ${AI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "3000:3000"

volumes:
  pgdata:
